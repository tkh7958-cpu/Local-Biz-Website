<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry Received | Louie's on Main</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Poppins:wght@200&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            color: #ffffff;
        }

        /* Ambient Red Glow in the background */
        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
        }

        .wrapper {
            text-align: center;
            z-index: 10;
            padding: 40px;
        }

        .brand-label {
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
            letter-spacing: 10px;
            font-size: 0.75rem;
            color: #FF0000;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-weight: 900;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 1;
            margin-bottom: 30px;
            font-style: italic; /* Italics add that "Chef's Signature" touch */
        }

        .highlight {
            color: #FF0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        p {
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
            font-size: 1rem;
            letter-spacing: 3px;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 60px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Sophisticated Understated Button */
        .btn-luxury {
            display: inline-block;
            padding: 18px 50px;
            border: 1px solid #FF0000;
            color: #FF0000;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
        }

        .btn-luxury:hover {
            background: #FF0000;
            color: #000000;
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.4);
            transform: translateY(-8px);
        }

        /* Minimal decorative line */
        .divider {
            height: 1px;
            width: 100px;
            background: linear-gradient(90deg, transparent, #FF0000, transparent);
            margin: 0 auto 40px;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="wrapper">
        <span class="brand-label">Louie's On Main</span>
        
        <h1>Exquisitely<br><span class="highlight">Reserved</span></h1>
        
        <div class="divider"></div>

        <p>Your correspondence has been received. Our concierge will reach out shortly.</p>
        
        <a href="index.html" class="btn-luxury">Return to Homepage</a>
    </div>

</body>
</html>
